<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Sample top-down building layout">
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e9f3" />
      <stop offset="100%" stop-color="#c9cbda" />
    </linearGradient>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0 L0 0 0 120" fill="none" stroke="#b8bed8" stroke-width="2" />
    </pattern>
  </defs>

  <rect x="30" y="30" width="1140" height="840" rx="40" fill="#21314d" />
  <rect x="66" y="66" width="1108" height="808" rx="28" fill="url(#grid)" />
  <rect x="94" y="94" width="1020" height="700" rx="20" fill="url(#floor)" stroke="#acc2e8" stroke-width="4" />

  <g fill="#eef2ff" font-family="system-ui, sans-serif" font-size="44" font-weight="700">
    <text x="150" y="150">Lobby</text>
    <text x="820" y="150">Open Office</text>
    <text x="150" y="430">Conference</text>
    <text x="820" y="430">Kitchen</text>
    <text x="150" y="720">Storage</text>
    <text x="820" y="720">Restroom</text>
  </g>

  <g fill="#fff" stroke="#2e3f5c" stroke-width="6" opacity="0.95">
    <rect x="120" y="170" width="440" height="220" rx="24" fill="#e9edf8" />
    <rect x="720" y="170" width="380" height="220" rx="24" fill="#eef3ff" />
    <rect x="120" y="460" width="440" height="220" rx="24" fill="#eef3ff" />
    <rect x="720" y="460" width="380" height="220" rx="24" fill="#e9eef8" />
    <rect x="120" y="740" width="440" height="120" rx="24" fill="#e6ebf5" />
    <rect x="720" y="740" width="380" height="120" rx="24" fill="#eff4ff" />
  </g>

  <g stroke="#2e3f5c" stroke-width="7" stroke-linecap="round">
    <line x1="560" y1="220" x2="720" y2="220" />
    <line x1="560" y1="300" x2="720" y2="300" />
    <line x1="560" y1="480" x2="720" y2="480" />
    <line x1="320" y1="700" x2="320" y2="820" />
    <line x1="980" y1="700" x2="980" y2="820" />
  </g>

  <g fill="#2c3d64" font-family="system-ui, sans-serif" font-size="32">
    <text x="140" y="240">Reception</text>
    <text x="760" y="240">Desks</text>
    <text x="140" y="520">Table</text>
    <text x="760" y="520">Fridge</text>
    <text x="140" y="780">Shelves</text>
    <text x="760" y="780">Stalls</text>
  </g>
</svg>
